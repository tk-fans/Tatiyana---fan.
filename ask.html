    <meta property="og:title" content="AI Бот — Скоро будет">
    <meta property="og:description" content="Наш искусственный интеллект скоро будет готов ответить на все ваши вопросы о Татьяне Куртуковой.">

    <meta name="twitter:image" content="https://i.postimg.cc/mkXzqXXs/Screenshot-2026-03-19-00-41-59-377-com-android-chrome-edit.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("https://i.postimg.cc/L50vY6Kf/New-Project-59F2DA6.png");
            background-size: cover; background-attachment: fixed; background-position: center;
            color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; margin: 0; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym46.cur'), auto !important;
        }

        a, button { cursor: url('https://cur.cursors-4u.net/symbols/sym-1/sym46.cur'), pointer !important; }

        /* --- Side Menu Styling --- */
        .menu-icon {
            position: fixed; top: 20px; left: 20px;
            font-size: 24px; color: #d4af37; cursor: pointer;
            z-index: 1100; background: rgba(26, 5, 0, 0.8);
            padding: 10px 15px; border-radius: 8px; border: 1px solid #d4af37;
        }

        .side-menu {
            position: fixed; top: 0; left: -50%; width: 50%; height: 100%;
            background: rgba(26, 5, 0, 0.98); border-right: 2px solid #d4af37;
            z-index: 1200; transition: 0.5s; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .side-menu.active { left: 0; }

        .menu-links { width: 100%; text-align: center; }
        .menu-links a {
            display: block; padding: 15px; text-decoration: none;
            font-size: 1.2rem; color: #d4af37; font-weight: bold;
            transition: 0.3s;
        }

        .menu-links a:hover, .menu-links a.active { color: #ff4d4d; transform: scale(1.1); }

        .close-btn {
            position: absolute; top: 20px; right: 25px;
            font-size: 36px; color: #d4af37; cursor: pointer;
        }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 1150;
        }
        .menu-overlay.active { display: block; }

        @media screen and (max-width: 768px) {
            .side-menu { width: 80%; left: -80%; }
        }

        /* --- Container Style --- */
        .container { 
            text-align: center; background: rgba(0,0,0,0.75); 
            padding: 40px; border-radius: 20px; border: 1px solid #d4af37; 
            max-width: 90%; backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }
        h1 { color: #d4af37; font-size: 2rem; margin-top: 10px; }
        p { font-size: 1.1rem; color: #ccc; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="menu-icon" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </div>

    <div id="sideMenu" class="side-menu">
        <div class="close-btn" onclick="toggleMenu()">&times;</div>
        <div class="menu-links">
            <a href="index.html">Главная</a>
            <a href="gallery.html">Галерея</a>
            <a href="news.html">Новости</a>
            <a href="videos.html">Видео</a> 
            <a href="quiz.html">Квиз</a>
            <a href="about.html">О нас</a>
            <hr style="border: 0.5px dashed #d4af37; width: 80%; margin: 20px auto;">
            <a href="ask.html" style="color: #FFD700;" class="active">
                <i class="fas fa-robot"></i> AI Bot
            </a>
        </div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <i class="fas fa-robot" style="font-size: 60px; color: #d4af37; margin-bottom: 20px;"></i>
        <h1>Раздел в разработке</h1>
        <p>Наш AI Bot скоро вернется с новыми возможностями!</p>
        <p style="font-size: 0.9rem; color: #d4af37;">ئەم بەشە لە ژێر چاکسازیدایە، بەم زووانە بە شێوازێکی باشتر دەگەڕێتەوە.</p>
    </div>

    <script>
        function toggleMenu() {
            const menu = document.getElementById("sideMenu");
            const overlay = document.getElementById("menuOverlay");
            menu.classList.toggle("active");
            overlay.classList.toggle("active");
        }
    </script>

</body>
</html>
