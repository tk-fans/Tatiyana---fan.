    <script>
        let currentCategory = 'all';

        // فانکشنی دیاریکردنی جۆر (گۆرانی، لایڤ، پۆدکاست)
        function setCategory(category) {
            currentCategory = category;
            
            // گۆڕینی ستایلی دوگمەکان
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + category).classList.add('active');
            
            filterVideos();
        }

        // فانکشنی سەرەکی بۆ فلتەرکردن و گەڕان بەیەکەوە
        function filterVideos() {
            const searchQuery = document.getElementById('videoSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.video-card');
            let visibleCount = 0;

            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                const matchesCategory = (currentCategory === 'all' || card.classList.contains(currentCategory));
                const matchesSearch = title.includes(searchQuery);

                if (matchesCategory && matchesSearch) {
                    card.classList.remove('hidden');
                    visibleCount++;
                } else {
                    card.classList.add('hidden');
                }
            });
